version: "3.9"
 
services:
 
  # =====================
  # DATABASE
  # =====================
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
 
 
  # =====================
  # RABBITMQ
  # =====================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
    #  - "5673:5672"
      - "15673:15672"
 
 
  # =====================
  # NGINX API GATEWAY
  # =====================
  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./server.crt:/etc/nginx/server.crt
      - ./server.key:/etc/nginx/server.key
      - ./dashboard:/usr/share/nginx/html/dashboard
      - ./user-dashboard:/usr/share/nginx/html/user-dashboard
    depends_on:
      - api1
      - api2
      - api3
      - auth-service
 
 
  # =====================
  # AUTH SERVICE
  # =====================
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "5001:5000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY: ${SECRET_KEY}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET}
      DB_HOST: db
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: https://localhost/login/google/callback
    depends_on:
      - db
 
 
  # =====================
  # API SERVICES
  # =====================
  api1:
    build: ./api
    volumes:
      - ./api/uploads:/app/uploads
      - rsa_keys:/app/keys 
    container_name: api1
    environment:
      INSTANCE_NAME: api1
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH_REDIRECT_URI: http://localhost:8080/auth/google/callback
      DB_HOST: db
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - db
      - rabbitmq
      - auth-service
 
  api2:
    build: ./api
    volumes:
      - ./api/uploads:/app/uploads
      - rsa_keys:/app/keys 
    container_name: api2
    environment:
      INSTANCE_NAME: api2
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH_REDIRECT_URI: http://localhost:8080/auth/google/callback
      DB_HOST: db
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - db
      - rabbitmq
      - auth-service
 
  api3:
    build: ./api
    volumes:
      - ./api/uploads:/app/uploads
      - rsa_keys:/app/keys 
    container_name: api3
    environment:
      INSTANCE_NAME: api3
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH_REDIRECT_URI: http://localhost:8080/auth/google/callback
      DB_HOST: db
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - db
      - rabbitmq
      - auth-service
 
 
  # =====================
  # WORKER
  # =====================
  worker:
    build: ./worker
    container_name: worker
    depends_on:
      - rabbitmq
      - db
    environment:
      PYTHONUNBUFFERED: 1
      DB_HOST: db
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
 
 
# =====================
# VOLUMES
# =====================
volumes:
  db_data:
  rsa_keys: