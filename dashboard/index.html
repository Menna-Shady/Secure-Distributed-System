<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SecureSystem — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#080c10;--surface:#0d1117;--surface2:#161b22;--border:#21262d;--accent:#00ff88;--accent2:#0affef;--danger:#ff4757;--warning:#ffa502;--info:#3a86ff;--purple:#a855f7;--text:#e6edf3;--muted:#7d8590;--font-mono:'Share Tech Mono',monospace;--font-main:'Syne',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-main);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,255,136,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.03) 1px,transparent 1px);background-size:40px 40px;}
  #login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg);}
  .login-box{width:420px;border:1px solid var(--border);background:var(--surface);padding:48px 40px;position:relative;animation:fadeIn .4s ease;}
  .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .login-logo{font-size:11px;letter-spacing:4px;color:var(--accent);font-family:var(--font-mono);margin-bottom:8px;}
  .login-title{font-size:26px;font-weight:800;margin-bottom:32px;}.login-title span{color:var(--accent);}
  .field{margin-bottom:20px;}.field label{display:block;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;font-family:var(--font-mono);}
  .field input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 16px;font-size:14px;font-family:var(--font-mono);outline:none;transition:border-color .2s;}
  .field input:focus{border-color:var(--accent);}
  .login-btn{width:100%;background:var(--accent);color:#000;border:none;padding:14px;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:var(--font-main);transition:opacity .2s;margin-top:8px;}
  .login-btn:hover{opacity:.85;}.login-btn:disabled{opacity:.4;cursor:not-allowed;}
  .google-btn{width:100%;background:transparent;color:var(--text);border:1px solid var(--border);padding:13px;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:var(--font-main);transition:all .2s;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:10px;}
  .google-btn:hover{border-color:#4285F4;color:#4285F4;background:rgba(66,133,244,0.05);}
  .login-error{margin-top:16px;color:var(--danger);font-size:13px;font-family:var(--font-mono);display:none;}
  #dashboard{display:none;position:relative;z-index:1;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:50;}
  .brand{display:flex;align-items:center;gap:12px;}.brand-icon{width:32px;height:32px;border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;}
  .brand-name{font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}.brand-name span{color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:20px;}
  .live{display:flex;align-items:center;gap:8px;font-size:12px;font-family:var(--font-mono);color:var(--muted);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite;}
  .logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 16px;font-size:12px;font-family:var(--font-mono);cursor:pointer;transition:all .2s;letter-spacing:1px;}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}
  .tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 32px;}
  .tab{padding:14px 24px;font-size:12px;letter-spacing:2px;text-transform:uppercase;font-family:var(--font-mono);color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
  .tab:hover{color:var(--text);}.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .main{padding:32px;max-width:1200px;margin:0 auto;}
  .tab-content{display:none;animation:fadeIn .3s ease;}.tab-content.active{display:block;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);padding:24px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;animation:slideUp .4s ease both;}
  .stat-card:hover{transform:translateY(-2px);}
  .stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
  .stat-card.green::after{background:var(--accent);}.stat-card.green:hover{border-color:var(--accent);}
  .stat-card.blue::after{background:var(--info);}.stat-card.blue:hover{border-color:var(--info);}
  .stat-card.red::after{background:var(--danger);}.stat-card.red:hover{border-color:var(--danger);}
  .stat-card.purple::after{background:var(--purple);}.stat-card.purple:hover{border-color:var(--purple);}
  .stat-label{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-family:var(--font-mono);margin-bottom:12px;}
  .stat-value{font-size:42px;font-weight:800;line-height:1;font-family:var(--font-mono);}
  .stat-card.green .stat-value{color:var(--accent);}.stat-card.blue .stat-value{color:var(--info);}
  .stat-card.red .stat-value{color:var(--danger);}.stat-card.purple .stat-value{color:var(--purple);}
  .stat-icon{position:absolute;top:20px;right:20px;font-size:24px;opacity:.15;}
  .stat-card:nth-child(1){animation-delay:.05s}.stat-card:nth-child(2){animation-delay:.10s}.stat-card:nth-child(3){animation-delay:.15s}.stat-card:nth-child(4){animation-delay:.20s}.stat-card:nth-child(5){animation-delay:.25s}
  .bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .panel{background:var(--surface);border:1px solid var(--border);padding:24px;}
  .panel-title{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;font-family:var(--font-mono);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .bar-chart{display:flex;flex-direction:column;gap:14px;}.bar-row{display:flex;align-items:center;gap:12px;}
  .bar-label{font-family:var(--font-mono);font-size:12px;color:var(--muted);width:120px;flex-shrink:0;}
  .bar-track{flex:1;height:6px;background:var(--border);overflow:hidden;}.bar-fill{height:100%;transition:width 1s cubic-bezier(.4,0,.2,1);width:0;}
  .bar-num{font-family:var(--font-mono);font-size:12px;color:var(--text);width:30px;text-align:right;flex-shrink:0;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .section-title{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;font-family:var(--font-mono);}
  .refresh-btn{background:transparent;border:1px solid var(--border);color:var(--accent);padding:6px 16px;font-size:11px;font-family:var(--font-mono);cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .2s;}
  .refresh-btn:hover{background:rgba(0,255,136,.05);border-color:var(--accent);}
  .data-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:13px;}
  .data-table th{text-align:left;padding:10px 14px;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2);}
  .data-table td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
  .data-table tr:hover td{background:var(--surface2);}.data-table tr:last-child td{border-bottom:none;}
  .badge{display:inline-block;padding:3px 10px;font-size:10px;letter-spacing:1px;border-radius:2px;font-family:var(--font-mono);}
  .badge-admin{background:rgba(168,85,247,.15);color:var(--purple);}.badge-user{background:rgba(0,255,136,.10);color:var(--accent);}
  .badge-active{background:rgba(0,255,136,.10);color:var(--accent);}.badge-inactive{background:rgba(255,71,87,.10);color:var(--danger);}
  .badge-ok{background:rgba(0,255,136,.10);color:var(--accent);}.badge-fail{background:rgba(255,71,87,.10);color:var(--danger);}
  .badge-warn{background:rgba(255,165,2,.10);color:var(--warning);}
  .hash{color:var(--muted);font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .empty-state{text-align:center;padding:48px;color:var(--muted);font-family:var(--font-mono);font-size:13px;}
  .loading{font-family:var(--font-mono);font-size:13px;color:var(--accent);text-align:center;padding:40px;letter-spacing:2px;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">SECURESYSTEM</div>
    <h2 class="login-title">Admin <span>Access</span></h2>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="admin@test.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••"/></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">ACCESS DASHBOARD</button>
    <div style="display:flex;align-items:center;gap:12px;margin-top:20px;">
      <div style="flex:1;height:1px;background:var(--border);"></div>
      <span style="font-size:11px;color:var(--muted);font-family:var(--font-mono);letter-spacing:2px;">OR</span>
      <div style="flex:1;height:1px;background:var(--border);"></div>
    </div>
    <button class="google-btn" id="google-btn" onclick="doGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      CONTINUE WITH GOOGLE
    </button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>
<div id="dashboard">
  <nav class="topbar">
    <div class="brand"><div class="brand-icon">🛡</div><div class="brand-name">Secure<span>System</span></div></div>
    <div class="topbar-right"><div class="live"><div class="dot"></div>SYSTEM ONLINE</div><button class="logout-btn" onclick="doLogout()">LOGOUT</button></div>
  </nav>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('overview')">Overview</div>
    <div class="tab" onclick="switchTab('users')">Users</div>
    <div class="tab" onclick="switchTab('files')">Files</div>
    <div class="tab" onclick="switchTab('logs')">Audit Logs</div>
  </div>
  <div class="main">
    <div class="tab-content active" id="tab-overview">
      <div id="stats-area"><div class="loading">LOADING STATS...</div></div>
      <div id="bottom-area"></div>
    </div>
    <div class="tab-content" id="tab-users">
      <div class="section-header"><div class="section-title">// registered users</div><button class="refresh-btn" onclick="loadUsers()">↻ REFRESH</button></div>
      <div class="panel" id="users-area"><div class="loading">LOADING...</div></div>
    </div>
    <div class="tab-content" id="tab-files">
      <div class="section-header"><div class="section-title">// uploaded files</div><button class="refresh-btn" onclick="loadFiles()">↻ REFRESH</button></div>
      <div class="panel" id="files-area"><div class="loading">LOADING...</div></div>
    </div>
    <div class="tab-content" id="tab-logs">
      <div class="section-header"><div class="section-title">// audit trail (last 50)</div><button class="refresh-btn" onclick="loadLogs()">↻ REFRESH</button></div>
      <div class="panel" id="logs-area"><div class="loading">LOADING...</div></div>
    </div>
  </div>
</div>
<script>
const BASE='https://localhost';let token='';
function switchTab(name){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['overview','users','files','logs'][i]===name));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.getElementById('tab-'+name).classList.add('active');if(name==='users')loadUsers();if(name==='files')loadFiles();if(name==='logs')loadLogs();}
async function doLogin(){const email=document.getElementById('email').value.trim(),pass=document.getElementById('password').value,btn=document.getElementById('login-btn'),err=document.getElementById('login-error');if(!email||!pass){showErr('Please fill all fields');return;}btn.disabled=true;btn.textContent='AUTHENTICATING...';err.style.display='none';try{const res=await fetch(`${BASE}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});const data=await res.json();if(!res.ok){showErr(data.error||'Login failed');return;}const payload=JSON.parse(atob(data.token.split('.')[1]));const role=payload.data?.role||payload.role;if(role!=='admin'){showErr('Admin privileges required');return;}token=data.token;document.getElementById('login-screen').style.display='none';document.getElementById('dashboard').style.display='block';loadStats();}catch(e){showErr('Cannot connect to server');}finally{btn.disabled=false;btn.textContent='ACCESS DASHBOARD';}}
function showErr(msg){const e=document.getElementById('login-error');e.textContent='⚠ '+msg;e.style.display='block';}
function doGoogleLogin(){window.location.href=`${BASE}/login/google`;}
function handleOAuthCallback(){const params=new URLSearchParams(window.location.search);const t=params.get('token');if(t){try{const payload=JSON.parse(atob(t.split('.')[1]));const role=payload.data?.role||payload.role;if(role!=='admin'){showErr('Admin privileges required');return;}token=t;window.history.replaceState({},'','/dashboard');document.getElementById('login-screen').style.display='none';document.getElementById('dashboard').style.display='block';loadStats();}catch(e){showErr('Invalid token from OAuth');}}}
window.addEventListener('DOMContentLoaded',handleOAuthCallback);
function doLogout(){token='';document.getElementById('login-screen').style.display='flex';document.getElementById('dashboard').style.display='none';document.getElementById('password').value='';}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')doLogin();});
async function loadStats(){document.getElementById('stats-area').innerHTML='<div class="loading">LOADING STATS...</div>';try{const res=await fetch(`${BASE}/admin/stats`,{headers:{'Authorization':`Bearer ${token}`}});const data=await res.json();renderStats(data);}catch(e){document.getElementById('stats-area').innerHTML='<div class="loading" style="color:var(--danger)">CONNECTION ERROR</div>';}}
function renderStats(d){const total=(d.success_logins||0)+(d.failed_logins||0);document.getElementById('stats-area').innerHTML=`<div class="stats-grid"><div class="stat-card green"><div class="stat-label">Total Users</div><div class="stat-value" id="n-users">0</div><div class="stat-icon">👤</div></div><div class="stat-card blue"><div class="stat-label">Files Uploaded</div><div class="stat-value" id="n-files">0</div><div class="stat-icon">📁</div></div><div class="stat-card green"><div class="stat-label">Successful Logins</div><div class="stat-value" id="n-ok">0</div><div class="stat-icon">✅</div></div><div class="stat-card red"><div class="stat-label">Failed Logins</div><div class="stat-value" id="n-fail">0</div><div class="stat-icon">⛔</div></div><div class="stat-card purple"><div class="stat-label">Queue Tasks</div><div class="stat-value" id="n-tasks">0</div><div class="stat-icon">⚙</div></div></div>`;animateCount('n-users',d.total_users||0);animateCount('n-files',d.total_files||0);animateCount('n-ok',d.success_logins||0);animateCount('n-fail',d.failed_logins||0);animateCount('n-tasks',d.queue_tasks||0);const max=Math.max(d.success_logins||0,d.failed_logins||0,total,1);document.getElementById('bottom-area').innerHTML=`<div class="bottom-grid"><div class="panel"><div class="panel-title">// login activity</div><div class="bar-chart"><div class="bar-row"><div class="bar-label">Successful</div><div class="bar-track"><div class="bar-fill" id="b-ok" style="background:var(--accent)"></div></div><div class="bar-num">${d.success_logins||0}</div></div><div class="bar-row"><div class="bar-label">Failed</div><div class="bar-track"><div class="bar-fill" id="b-fail" style="background:var(--danger)"></div></div><div class="bar-num">${d.failed_logins||0}</div></div><div class="bar-row"><div class="bar-label">Total</div><div class="bar-track"><div class="bar-fill" id="b-total" style="background:var(--info)"></div></div><div class="bar-num">${total}</div></div></div></div><div class="panel"><div class="panel-title">// quick summary</div><div style="display:flex;flex-direction:column;gap:16px;font-family:var(--font-mono);font-size:13px;"><div style="display:flex;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Success rate</span><span style="color:var(--accent)">${total?Math.round((d.success_logins||0)/total*100):0}%</span></div><div style="display:flex;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Failure rate</span><span style="color:var(--danger)">${total?Math.round((d.failed_logins||0)/total*100):0}%</span></div><div style="display:flex;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Files stored</span><span style="color:var(--info)">${d.total_files||0}</span></div><div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Registered users</span><span style="color:var(--purple)">${d.total_users||0}</span></div></div></div></div>`;setTimeout(()=>{setBar('b-ok',(d.success_logins||0)/max*100);setBar('b-fail',(d.failed_logins||0)/max*100);setBar('b-total',total/max*100);},100);}
async function loadUsers(){document.getElementById('users-area').innerHTML='<div class="loading">LOADING...</div>';try{const res=await fetch(`${BASE}/admin/users`,{headers:{'Authorization':`Bearer ${token}`}});const data=await res.json();if(!data.users?.length){document.getElementById('users-area').innerHTML='<div class="empty-state">No users found</div>';return;}document.getElementById('users-area').innerHTML=`<table class="data-table"><thead><tr><th>#</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Created</th></tr></thead><tbody>${data.users.map(u=>`<tr><td style="color:var(--muted)">${u.id}</td><td><strong>${u.username||'—'}</strong></td><td style="color:var(--muted)">${u.email}</td><td><span class="badge badge-${u.role}">${u.role.toUpperCase()}</span></td><td><span class="badge ${u.is_active?'badge-active':'badge-inactive'}">${u.is_active?'ACTIVE':'INACTIVE'}</span></td><td style="color:var(--muted);font-size:11px">${u.created_at?u.created_at.split('.')[0]:'—'}</td></tr>`).join('')}</tbody></table>`;}catch(e){document.getElementById('users-area').innerHTML='<div class="empty-state" style="color:var(--danger)">Error loading users</div>';}}
async function loadFiles(){document.getElementById('files-area').innerHTML='<div class="loading">LOADING...</div>';try{const res=await fetch(`${BASE}/admin/files`,{headers:{'Authorization':`Bearer ${token}`}});const data=await res.json();if(!data.files?.length){document.getElementById('files-area').innerHTML='<div class="empty-state">No files uploaded yet</div>';return;}document.getElementById('files-area').innerHTML=`<table class="data-table"><thead><tr><th>#</th><th>Filename</th><th>User ID</th><th>SHA-256 Hash</th><th>Action</th></tr></thead><tbody>${data.files.map(f=>`<tr><td style="color:var(--muted)">${f.id}</td><td style="color:var(--accent)">${f.filename}</td><td style="color:var(--muted)">${f.user_id}</td><td><div class="hash" title="${f.file_hash}">${f.file_hash||'—'}</div></td><td><button onclick="doDownload('${f.filename}')" style="background:transparent;border:1px solid var(--border);color:var(--accent);padding:4px 12px;font-size:11px;font-family:var(--font-mono);cursor:pointer;">⬇ DL</button></td></tr>`).join('')}</tbody></table>`;}catch(e){document.getElementById('files-area').innerHTML='<div class="empty-state" style="color:var(--danger)">Error loading files</div>';}}
async function doDownload(filename){try{const res=await fetch(`${BASE}/download/${filename}`,{headers:{'Authorization':`Bearer ${token}`}});if(!res.ok){alert('Download failed');return;}const blob=await res.blob();const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}catch(e){alert('Download error');}}
async function loadLogs(){document.getElementById('logs-area').innerHTML='<div class="loading">LOADING...</div>';try{const res=await fetch(`${BASE}/admin/logs`,{headers:{'Authorization':`Bearer ${token}`}});const data=await res.json();if(!data.logs?.length){document.getElementById('logs-area').innerHTML='<div class="empty-state">No logs yet</div>';return;}document.getElementById('logs-area').innerHTML=`<table class="data-table"><thead><tr><th>Action</th><th>Status</th><th>User ID</th><th>IP</th><th>Details</th><th>Time</th></tr></thead><tbody>${data.logs.map(l=>`<tr><td><strong>${l.action}</strong></td><td><span class="badge ${l.status==='success'?'badge-ok':l.status==='failed'?'badge-fail':'badge-warn'}">${l.status?.toUpperCase()}</span></td><td style="color:var(--muted)">${l.user_id||'—'}</td><td style="color:var(--muted);font-size:11px">${l.ip||'—'}</td><td style="color:var(--muted);font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.details||'—'}</td><td style="color:var(--muted);font-size:11px;white-space:nowrap">${l.timestamp?l.timestamp.split('.')[0]:'—'}</td></tr>`).join('')}</tbody></table>`;}catch(e){document.getElementById('logs-area').innerHTML='<div class="empty-state" style="color:var(--danger)">Error loading logs</div>';}}
function setBar(id,pct){const el=document.getElementById(id);if(el)el.style.width=Math.max(pct,2)+'%';}
function animateCount(id,target){const el=document.getElementById(id);if(!el)return;const start=Date.now(),dur=800;const tick=()=>{const p=Math.min((Date.now()-start)/dur,1),e=1-Math.pow(1-p,3);el.textContent=Math.round(e*target);if(p<1)requestAnimationFrame(tick);};requestAnimationFrame(tick);}
</script>
</body>
</html>
