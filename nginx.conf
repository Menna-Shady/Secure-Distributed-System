events {}
 
http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
 
    # =====================
    # REQUEST SIZE LIMIT
    # =====================
    client_max_body_size 5m;
 
    upstream api_backend {
        server api1:5000;
        server api2:5000;
        server api3:5000;
    }
 
 
    server {
        listen 80;
        return 301 https://localhost$request_uri;
    }
 
    server {
        listen 443 ssl;
 
        ssl_certificate /etc/nginx/server.crt;
        ssl_certificate_key /etc/nginx/server.key;
 
        # =====================
        # SECURITY HEADERS
        # =====================
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'" always;
 
        location /dashboard {
            alias /usr/share/nginx/html/dashboard;
            index index.html;
            add_header Content-Security-Policy "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://localhost;" always;
        }

        location /user {
            alias /usr/share/nginx/html/user-dashboard;
            index index.html;
            add_header Content-Security-Policy "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://localhost;" always;
        }

        location /my/ {
            limit_req zone=api_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/ {
            limit_req zone=api_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /upload {
            limit_req zone=api_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /download/ {
            limit_req zone=api_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

        location /task {
            limit_req zone=api_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            limit_req zone=api_limit burst=1 nodelay;
            limit_req_status 429;
 
            proxy_pass http://api_backend;
        }
 
        location /auth/login {
           limit_req zone=api_limit burst=20 nodelay;
           proxy_pass http://api_backend;
        }

        location /login {
           limit_req zone=api_limit burst=3 nodelay;
           proxy_pass http://auth-service:5000;
        }

        location /register {
           limit_req zone=api_limit burst=3 nodelay;
           proxy_pass http://auth-service:5000;
        }

        location /verify {
           limit_req zone=api_limit burst=5 nodelay;
           proxy_pass http://auth-service:5000;
        }

        location /login/google {
           proxy_pass http://auth-service:5000;
        }

        location /logout {
           limit_req zone=api_limit burst=5 nodelay;
           proxy_pass http://auth-service:5000;
        }
 
        location /uploads/ {
            deny all;
        }
    }
}